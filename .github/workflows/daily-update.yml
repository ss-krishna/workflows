name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs daily at 02:30 UTC (specific time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "23f1000655@ds.study.iitm.ac.in"

      - name: Update file 23f1000655@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily_log.txt
          git add daily_log.txt
          git commit -m "Automated daily update - $(date)"
          git push
